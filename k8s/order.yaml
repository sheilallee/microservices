apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: grpc-order:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ENV
              value: "production"
            - name: DATA_SOURCE_URL
              value: "root:minhasenha@tcp(mysql:3306)/order?charset=utf8mb4&parseTime=True&loc=Local"
            - name: APPLICATION_PORT
              value: "3000"
            - name: PAYMENT_SERVICE_URL
              value: "payment:3001"
            - name: SHIPPING_SERVICE_URL
              value: "shipping:3002"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: default
spec:
  selector:
    app: order
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
  type: NodePort
